<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAM SMKN 2 Klaten</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQut21jU5YAlsMi_ePnG5DaQH5FBPdPC86yGA&s');
	background-repeat: repeat;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 700px; /* Diperlebar agar muat bingkai form */
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
        }
        /* Bingkai untuk menampilkan Form */
        .bingkai-form {
            width: 100%;
            height: 500px; /* Mengatur tinggi bingkai form */
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 15px;
        }
        .no-form {
            color: #e74c3c;
            font-style: italic;
            padding: 40px 0;
            font-weight: bold;
        }
        .info-waktu {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Akses EXAM SMKN 2 KLATEN</h2>
    
    <!-- Tempat di mana iframe/bingkai form akan muncul secara dinamis -->
    <div id="container-link">
        <p class="no-form">Memeriksa jadwal formulir...</p>
    </div>

    <div class="info-waktu" id="live-clock">
        Waktu sekarang: --:--:--
    </div>
</div>

<script>

            url: 'https://docs.google.com/forms/d/e/1FAIpQLSeIPHbgmfonfJQmzn7K7nCku2Y94Y1L1rgkYlLm0SirVqpDiQ/viewform' // Contoh link embed Google Form
        },
        {
            tanggal: '2026-06-02', 
            jamMulai: '09:25', 
            jamSelesai: '11:10', // Sesi aktif saat ini
            url: 'https://docs.google.com/forms/d/e/1FAIpQLScG_9TERnxw2P_t2s7W0l5LqLg6gmnhSMtHpO-c2Ux1YHJhEg/viewform'
        },
	{
            tanggal: '2026-06-03', 
            jamMulai: '07:25', 
            jamSelesai: '09:10', 
            url: 'https://docs.google.com/forms/d/e/1FAIpQLSf65av65c67dDwwpCbViTd38S_W7giktC5z5ItzZaPlt9bysg/viewform' 
        },
      	 {
            tanggal: '2026-06-03', 
            jamMulai: '12:25', 
            jamSelesai: '14:10', // Sesi aktif saat ini
            url: 'https://docs.google.com/forms/d/e/1FAIpQLSefk-BzryGjS2W7LNoz7gPeThXPKc0kFBZT63yI0DeoeNX-Gg/viewform'
        },
	{
            tanggal: '2026-06-04',

            jamSelesai: '09:10', 
            url: 'https://docs.google.com/forms/d/e/1FAIpQLScR8j8EBwWFfOAcDzyYzFfWsVswcrbnfy-RD0yd03mbscJm_w/viewform' 
        },
        {
            tanggal: '2026-06-04', 
            jamMulai: '09:25', 
            jamSelesai: '11:10', // Sesi aktif saat ini
            url: 'https://docs.google.com/forms/d/e/1FAIpQLScZmsXcXAmTckpUOdTBtcBBXwsoZha0EAOeLy4BTA9fBvsYng/viewform'
        },
	 {
            tanggal: '2026-06-04', 
            jamMulai: '12:25', 
            jamSelesai: '14:10', // Sesi aktif saat ini
            url: 'https://docs.google.com/forms/d/e/1FAIpQLScDsEAjXBlj8jjlxHYX1MJL3DoMX3kQS8Md0smnYomEqrAPLQ/viewform'
        },
	 {
            tanggal: '2026-06-05', 
            jamMulai: '07:25', 
            jamSelesai: '09:10', // Sesi aktif saat ini
            url: 'https://docs.google.com/forms/d/e/1FAIpQLScoEvF5Y8sXo9fYZqY1paunlQxpZqjVVZCVeJKO34_1UP-P9A/viewform'
        },
	 {
            tanggal: '2026-06-05', 
            jamMulai: '09:25', 
            jamSelesai: '11:10', // Sesi aktif saat ini
            url: 'https://docs.google.com/forms/d/e/1FAIpQLSdo5t92xUW07q5poXmXaDFLyoHS72AcI2__d1m8oAv3sPomAA/viewform'
        },
    ];

    function cekDanTampilkanForm() {
        const sekarang = new Date();
        
        const tahun = sekarang.getFullYear();
        const bulan = String(sekarang.getMonth() + 1).padStart(2, '0');
        const tanggal = String(sekarang.getDate()).padStart(2, '0');
        const tanggalSekarangStr = `${tahun}-${bulan}-${tanggal}`;
        
        const jam = String(sekarang.getHours()).padStart(2, '0');
        const menit = String(sekarang.getMinutes()).padStart(2, '0');
        const detik = String(sekarang.getSeconds()).padStart(2, '0');
        const jamSekarangStr = `${jam}:${menit}`;

        document.getElementById('live-clock').innerText = `Waktu sekarang: ${tanggalSekarangStr} Pukul ${jam}:${menit}:${detik}`;

        const containerLink = document.getElementById('container-link');
        
        const formAktif = daftarJadwal.find(jadwal => {
            return jadwal.tanggal === tanggalSekarangStr && 
                   jamSekarangStr >= jadwal.jamMulai && 
                   jamSekarangStr <= jadwal.jamSelesai;
        });

        if (formAktif) {
            // Memeriksa apakah iframe sudah ada agar tidak terus-menerus reload setiap detik
            const iframeAda = document.getElementById('iframe-form');
            if (!iframeAda || iframeAda.src !== formAktif.url) {
                containerLink.innerHTML = `
                    <iframe id="iframe-form" src="${formAktif.url}" class="bingkai-form" frameborder="0" marginheight="0" marginwidth="0">
                        Memuat...
                    </iframe>`;
            }
        } else {
            containerLink.innerHTML = `<p class="no-form">Maaf, saat ini tidak ada EXAM/Ujian yang dibuka sesuai jadwal.</p>`;
        }
    }

    // Jalankan realtime cek
    cekDanTampilkanForm();
    setInterval(cekDanTampilkanForm, 1000);
</script>

</body>
</html>
